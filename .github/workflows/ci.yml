name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_BUILD_IMAGE_NAME: aegisai

# Cancel in-flight runs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ##############################################################################
  # Frontend — Lint, typecheck, test, build
  ##############################################################################
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc -b --noEmit

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

  ##############################################################################
  # Backend API — Lint, test
  ##############################################################################
  backend-api:
    name: Backend API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend-api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint
        run: ruff check

      - name: Test
        run: python -m pytest -v

  ##############################################################################
  # Backend AI — Lint, test
  ##############################################################################
  backend-ai:
    name: Backend AI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-ai

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend-ai/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint
        run: ruff check

      - name: Test
        run: python -m pytest -v

  ##############################################################################
  # MCP Server — Lint, test
  ##############################################################################
  mcp-server:
    name: MCP Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: mcp-server/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint
        run: ruff check

      - name: Test
        run: python -m pytest -v

  ##############################################################################
  # Docker images — build all services
  ##############################################################################
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - frontend
          - backend-api
          - backend-ai
          - mcp-server

    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.service }} image
        run: |
          docker build \
            -t ${{ env.DOCKER_BUILD_IMAGE_NAME }}/${{ matrix.service }}:${{ github.sha }} \
            -t ${{ env.DOCKER_BUILD_IMAGE_NAME }}/${{ matrix.service }}:latest \
            ./${{ matrix.service }}
