services:

  frontend:
    container_name: aegisai-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://backend-api:8000
    depends_on:
      - backend-api
    networks:
      - aegisai-network


  backend-api:
    container_name: aegisai-api
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend-api:/app
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/aegisai
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - aegisai-network


  backend-ai:
    container_name: aegisai-ai
    build:
      context: ./backend-ai
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - ./backend-ai:/app
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_URL=redis://redis:6379
    depends_on:
      - qdrant
      - redis
    networks:
      - aegisai-network


  mcp-server:
    container_name: aegisai-mcp
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    volumes:
      - ./mcp-server:/app
    networks:
      - aegisai-network


  postgres:
    container_name: aegisai-postgres
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aegisai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - aegisai-network


  redis:
    container_name: aegisai-redis
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - aegisai-network


  qdrant:
    container_name: aegisai-qdrant
    image: qdrant/qdrant:v1.15.0
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - aegisai-network



volumes:

  postgres-data:
  redis-data:
  qdrant-data:



networks:

  aegisai-network:
    driver: bridge