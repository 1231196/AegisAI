services:

  frontend:
    container_name: aegisai-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # The dockerized Vite dev server reads ``VITE_BACKEND_URL`` to
      # choose the proxy ``/api`` target. ``VITE_API_URL`` would be
      # ignored and the proxy would default to ``127.0.0.1:8000`` (which,
      # from inside this container, is the container itself).
      - VITE_BACKEND_URL=http://backend-api:8000
    depends_on:
      - backend-api
    networks:
      - aegisai-network


  backend-api:
    container_name: aegisai-api
    build:
      context: ./backend-api
      dockerfile: Dockerfile
    # Override the Dockerfile CMD so every container start wipes
    # __pycache__ from the bind-mount before uvicorn boots. Python's
    # mtime-based bytecode invalidation can be unreliable on a bind
    # mount under Docker Desktop on macOS, which previously let a
    # stale .pyc keep re-installing the pre-fix PRAGMA-listener and
    # reconnect-poisoning Postgres on every restart. Baking the wipe
    # into the entry command makes that class of footgun impossible
    # regardless of mtime propagation. PYTHONDONTWRITEBYTECODE=1
    # (below) then prevents any new .pyc from accumulating during
    # this run.
    command:
      - "sh"
      - "-c"
      - "find /app -name __pycache__ -type d -exec rm -rf {} + 2>/dev/null; exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./backend-api:/app
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/aegisai
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - aegisai-network


  backend-ai:
    container_name: aegisai-ai
    build:
      context: ./backend-ai
      dockerfile: Dockerfile
    # Same stale-pycache defence as backend-api: wipe __pycache__
    # under the bind mount on every start, then disable bytecode
    # writes for the rest of the run. See the discussion above
    # backend-api for the rationale; the original incident was
    # here on backend-api but the same risk class applies because
    # both services use python:3.12-slim + a bind-mounted /app.
    command:
      - "sh"
      - "-c"
      - "find /app -name __pycache__ -type d -exec rm -rf {} + 2>/dev/null; exec uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload"
    ports:
      - "8001:8001"
    volumes:
      - ./backend-ai:/app
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_URL=redis://redis:6379
    depends_on:
      - qdrant
      - redis
    networks:
      - aegisai-network


  mcp-server:
    container_name: aegisai-mcp
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    # Same stale-pycache defence as backend-api / backend-ai. The
    # original CMD is just `python app/main.py` (no --reload), so
    # the wrapper exec's that. See the rationale above backend-api.
    command:
      - "sh"
      - "-c"
      - "find /app -name __pycache__ -type d -exec rm -rf {} + 2>/dev/null; exec python app/main.py"
    ports:
      - "9000:9000"
    volumes:
      - ./mcp-server:/app
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    networks:
      - aegisai-network


  postgres:
    container_name: aegisai-postgres
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aegisai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - aegisai-network


  redis:
    container_name: aegisai-redis
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - aegisai-network


  qdrant:
    container_name: aegisai-qdrant
    image: qdrant/qdrant:v1.15.0
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - aegisai-network



volumes:

  postgres-data:
  redis-data:
  qdrant-data:



networks:

  aegisai-network:
    driver: bridge